<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e6edf3;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.1rem;
      color: #8b949e;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World!</h1>
    <p>Welcome to <a href="https://github.com/stevenpsm" target="_blank" rel="noopener">stevenpsm</a>'s GitHub Pages.</p>
  </div>
</body>
</html>
