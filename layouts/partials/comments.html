{{- if .Param "comments" }}
<div class="comments">
  <script src="https://giscus.app/client.js"
    data-repo="stevenpsm/stevenpsm.github.io"
    data-repo-id="REPLACE_WITH_REPO_ID"
    data-category="Announcements"
    data-category-id="REPLACE_WITH_CATEGORY_ID"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="preferred_color_scheme"
    data-lang="zh-CN"
    crossorigin="anonymous"
    async>
  </script>
  <!-- 
    ⚠️  激活 giscus 评论的步骤：
    1. 仓库 Settings → Features → 开启 Discussions
    2. 安装 giscus App: https://github.com/apps/giscus
    3. 访问 https://giscus.app，输入 stevenpsm/stevenpsm.github.io
    4. 将生成的 data-repo-id 和 data-category-id 替换上方占位符
  -->
</div>
{{- end }}
